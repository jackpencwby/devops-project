- name: Allow SSH connections
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Allow HTTP connections
  community.general.ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Allow HTTPS connections
  community.general.ufw:
    rule: allow
    port: '443'
    proto: tcp

- name: Enable UFW with default deny policy
  community.general.ufw:
    state: enabled
    policy: deny